<!DOCTYPE html>
<html lang="en">

    <head>
    
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
        <title>tic tac toe &bull; Juri Gemignani</title>
        <link rel="shortcut icon" href="https://static-00.iconduck.com/assets.00/tic-tac-toe-icon-510x512-030kkgu2.png" type="image/x-icon">
    
        <link rel="stylesheet" href="style/style-lg.css">
        <link rel="stylesheet" href="style/style-sm.css" media="screen and (max-width: 768px)">
        <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    
    </head>

    <body>
        
        <p id="title">tic tac toe</p>

        <div class="point point-x" id="x">0</div>
        <div class="point point-o" id="o">0</div>

        <div class="game">

            <div class="game-line">
                <div class="cell" id="0"></div>
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
            </div>
            <div class="game-line">
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
            </div>
            <div class="game-line">
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
            </div>

        </div>

        <p id="phrase"></p>

        <script src="script/app.js"></script>
        
    </body>

</html>
